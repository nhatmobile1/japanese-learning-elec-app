<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>語 Japanese Learning</title>
    <script>
      try {
        var d = document.documentElement.dataset;
        if (localStorage.getItem('theme') === 'dark') d.theme = 'dark';
        // Keep these whitelists in sync with web/src/settings.ts.
        var pal = localStorage.getItem('palette');
        d.palette =
          ['ruri', 'wakakusa', 'kikyo', 'ponyo', 'jisho'].indexOf(pal) >= 0
            ? pal
            : 'ruri';
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
